<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8102E"/>
      <stop offset="100%" style="stop-color:#9B0A1E"/>
    </linearGradient>
    <linearGradient id="eagleGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#C5960E"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)" stroke="#D4AF37" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="44" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>

  <!-- Star -->
  <path d="M50 10 L52.5 17 L60 17 L54 22 L56 29 L50 25 L44 29 L46 22 L40 17 L47.5 17 Z"
        fill="#D4AF37" opacity="0.95"/>

  <!-- Eagle (simplified for icon size) -->
  <g fill="url(#eagleGold)">
    <!-- Left wing -->
    <path d="M46 42 Q36 32 22 28 Q28 34 30 38 Q24 36 18 38 Q26 42 34 44 Q28 44 24 48 Q34 48 42 46 L44 48 Z"/>
    <!-- Right wing -->
    <path d="M54 42 Q64 32 78 28 Q72 34 70 38 Q76 36 82 38 Q74 42 66 44 Q72 44 76 48 Q66 48 58 46 L56 48 Z"/>
    <!-- Body -->
    <ellipse cx="50" cy="50" rx="8" ry="10"/>
    <!-- Head -->
    <ellipse cx="50" cy="36" rx="5.5" ry="5"/>
    <!-- Neck -->
    <path d="M47 40 Q50 37 53 40 L54 44 Q50 42 46 44 Z"/>
    <!-- Beak -->
    <path d="M55.5 36 L60 38.5 L55.5 39 Z" fill="#B8860B"/>
    <!-- Eye -->
    <circle cx="52.5" cy="35" r="1.3" fill="#8B0000"/>
    <circle cx="52.8" cy="34.7" r="0.5" fill="#1a0000"/>
    <!-- Chest detail -->
    <ellipse cx="50" cy="50" rx="4" ry="5.5" fill="#C8102E" opacity="0.4"/>
    <!-- Tail -->
    <path d="M44 58 L42 70 L45 66 L47 72 L50 68 L53 72 L55 66 L58 70 L56 58 Z"/>
    <!-- Talons -->
    <g stroke="#B8860B" stroke-width="1" fill="none" stroke-linecap="round">
      <path d="M46 58 L42 64 M42 64 L40 67 M42 64 L44 67"/>
      <path d="M54 58 L58 64 M58 64 L60 67 M58 64 L56 67"/>
    </g>
  </g>
</svg>
